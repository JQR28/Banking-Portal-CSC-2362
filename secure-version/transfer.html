{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #461d7c;">Make a Transfer</h2>
    <form method="POST">
        <!-- FIX #6: CSRF token prevents cross-site request forgery -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>From Account:</label>
            <select name="from_account" required>
                {% for account in accounts %}
                <option value="{{ account.account_number }}">
                    {{ account.account_number }} - ${{ "%.2f"|format(account.balance) }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>To Account Number:</label>
            <input type="text" name="to_account" required placeholder="Enter account number (e.g., ACC12345)">
        </div>
        
        <div class="form-group">
            <label>Amount ($):</label>
            <input type="number" name="amount" step="0.01" min="0.01" required>
        </div>
        
        <div class="form-group">
            <label>Description:</label>
            <input type="text" name="description" placeholder="What's this for?">
        </div>
        
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary btn-large">Transfer Money</button>
        </div>
    </form>
</div>
{% endblock %}
